<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="title">
  <title id="title">CRT terminal displaying Terminal Varginha boot log</title>
  <rect width="1200" height="480" fill="#0a0a0a"/>
  <g transform="translate(180 50)">
    <rect x="0" y="0" width="840" height="380" rx="14" fill="#141414" stroke="#2a2a2a" stroke-width="2"/>
    <rect x="20" y="20" width="800" height="320" fill="#06120a" stroke="#0f2a16" stroke-width="2"/>
    <rect x="20" y="20" width="800" height="320" fill="url(#scan)"/>
    <defs>
      <pattern id="scan" width="2" height="2" patternUnits="userSpaceOnUse">
        <rect width="2" height="1" fill="#000" opacity="0.18"/>
      </pattern>
    </defs>
    <g font-family="Courier, monospace" font-size="14" fill="#00ff41" letter-spacing="1">
      <text x="40" y="56">UFO74-OS v0.94</text>
      <text x="40" y="80">&gt; mount /case/varginha-1996 ............ ok</text>
      <text x="40" y="100">&gt; load witness/silva,liliane ............ ok</text>
      <text x="40" y="120">&gt; load witness/silva,valquiria .......... ok</text>
      <text x="40" y="140">&gt; load witness/xavier,katia ............. ok</text>
      <text x="40" y="160">&gt; index /press/folha-de-varginha ........ ok</text>
      <text x="40" y="180">&gt; risk_engine.start ..................... ok</text>
      <text x="40" y="220" fill="#f5a623">[ALERT] override protocol available.</text>
      <text x="40" y="240" fill="#f5a623">[ALERT] it is not safe.</text>
      <text x="40" y="280">&gt; _</text>
    </g>
    <rect x="60" y="270" width="10" height="16" fill="#00ff41"/>
    <circle cx="420" cy="360" r="4" fill="#1f1f1f"/>
    <text x="60" y="365" font-family="Courier, monospace" font-size="10" fill="#4a4845" letter-spacing="2">UFO74 / TERMINAL VARGINHA</text>
  </g>
  <ellipse cx="600" cy="450" rx="220" ry="6" fill="#00ff41" opacity="0.05"/>
</svg>
