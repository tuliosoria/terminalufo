<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="title">
  <title id="title">Classified case folder marked Varginha 1996</title>
  <defs>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#0a0a0a"/>
      <circle cx="1" cy="1" r="0.4" fill="#1a1a1a"/>
    </pattern>
    <pattern id="lines" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M0 0L6 6" stroke="#1f1f1f" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="480" fill="url(#grain)"/>
  <rect x="80" y="60" width="1040" height="360" fill="#141414" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="80" y="60" width="1040" height="40" fill="#1c1c1c"/>
  <text x="110" y="88" font-family="Courier, monospace" font-size="20" fill="#8a8680" letter-spacing="3">CASE FILE / VARGINHA / 1996-01-20</text>
  <rect x="80" y="60" width="1040" height="360" fill="url(#lines)"/>
  <g transform="translate(160 180) rotate(-8)">
    <rect x="0" y="0" width="520" height="120" fill="#ff3b30" opacity="0.92"/>
    <text x="260" y="78" text-anchor="middle" font-family="'Special Elite', Courier, monospace" font-size="64" fill="#0a0a0a" letter-spacing="6">CLASSIFIED</text>
  </g>
  <g transform="translate(760 250) rotate(6)">
    <rect x="0" y="0" width="320" height="60" fill="none" stroke="#f5a623" stroke-width="3"/>
    <text x="160" y="42" text-anchor="middle" font-family="'Special Elite', Courier, monospace" font-size="28" fill="#f5a623" letter-spacing="4">EYES ONLY</text>
  </g>
  <text x="110" y="408" font-family="Courier, monospace" font-size="14" fill="#4a4845" letter-spacing="2">FILE-VRGH-19960120 // PUBLIC RECORD COMPILATION // SOURCE: WITNESS PRESS REPORTS</text>
</svg>
